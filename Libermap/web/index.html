<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libermap - Mapeamento FTTH</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- App CSS -->
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <!-- Header -->
    <header id="app-header">
        <div class="header-left">
            <h1>🗺️ Libermap</h1>
            <span class="version">v0.1.0</span>
        </div>
        <div class="header-center">
            <select id="area-select">
                <option value="">Todas as áreas</option>
            </select>
            <input type="text" id="search-input" placeholder="Buscar elemento..." />
        </div>
        <div class="header-right">
            <button id="btn-add-element" title="Adicionar elemento">
                <i data-lucide="plus-circle"></i>
            </button>
            <button id="btn-toggle-layers" title="Camadas">
                <i data-lucide="layers"></i>
            </button>
            <button id="btn-export" title="Exportar">
                <i data-lucide="download"></i>
            </button>
        </div>
    </header>

    <!-- Mapa -->
    <div id="map"></div>

    <!-- Painel lateral -->
    <aside id="sidebar" class="hidden">
        <div class="sidebar-header">
            <h2 id="sidebar-title">Detalhes</h2>
            <button id="btn-close-sidebar">
                <i data-lucide="x"></i>
            </button>
        </div>
        <div id="sidebar-content"></div>
    </aside>

    <!-- Modal de criação de elemento -->
    <dialog id="modal-element">
        <form id="form-element">
            <h2>Novo Elemento</h2>

            <label for="elem-type">Tipo</label>
            <select id="elem-type" required>
                <option value="pop">POP</option>
                <option value="cto">CTO</option>
                <option value="ceo">Caixa de Emenda</option>
                <option value="splitter">Splitter</option>
                <option value="poste">Poste</option>
            </select>

            <label for="elem-name">Nome</label>
            <input type="text" id="elem-name" required placeholder="Ex: CTO-001" />

            <label for="elem-address">Endereço</label>
            <input type="text" id="elem-address" placeholder="Rua, número" />

            <label for="elem-area">Área</label>
            <input type="text" id="elem-area" placeholder="Nome do bairro" />

            <label for="elem-capacity">Capacidade</label>
            <input type="number" id="elem-capacity" min="1" placeholder="Nº de portas/fibras" />

            <input type="hidden" id="elem-lat" />
            <input type="hidden" id="elem-lng" />

            <div class="form-actions">
                <button type="button" id="btn-cancel-element">Cancelar</button>
                <button type="submit">Salvar</button>
            </div>
        </form>
    </dialog>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- App JS -->
    <script src="/js/api.js"></script>
    <script src="/js/map.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
